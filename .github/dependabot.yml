version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    # The release toolchain (jgit + axion-release + jreleaser) is pinned by hand —
    # getting them to cooperate took real effort, so we hold bumps until they're
    # validated together. Bump manually when needed.
    ignore:
      - dependency-name: "org.jreleaser*"
      - dependency-name: "pl.allegro.tech.build.axion-release*"
      - dependency-name: "org.eclipse.jgit*"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

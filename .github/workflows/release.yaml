name: Release

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Release Type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "graalvm"
          java-version: "25"
          cache: "gradle"

      - name: Set Git Identity
        run: |
          git config --global user.email "mariano.gonzalez.mx@gmail.com"
          git config --global user.name "Mariano Gonzalez"

      # actions/checkout v5+ stores GITHUB_TOKEN in `git config http.extraheader`
      # instead of embedding it in the origin URL. Native `git` honors extraheader;
      # the jgit version pinned via `force(libs.jgit)` in build.gradle.kts does not.
      # Axion-release pushes the release tag through jgit, so it falls back to
      # anonymous and GitHub rejects the push as "not authorized". Embedding the
      # token directly in the remote URL restores the v4-era behavior for the
      # jgit-driven push without bumping the release-toolchain trio.
      - name: Configure git remote auth for jgit
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Setup GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Update Version and Create Tag
        id: version
        run: |
          # Create release with specified increment type
          ./gradlew release -Prelease.incrementer=${{ inputs.releaseType }} -Prelease.disableChecks -x test

          # Get the version number
          RAW_VERSION=$(./gradlew currentVersion -q -Prelease.quiet)

          # Use the actual tag name that was created (with 'v' prefix)
          TAG_VERSION="v$RAW_VERSION"

          echo "version=$RAW_VERSION" >> $GITHUB_OUTPUT
          echo "tagName=$TAG_VERSION" >> $GITHUB_OUTPUT

      - name: Build project
        run: |
          # publishAllLibModules fans out to every :lib:* publish task (see lib/build.gradle.kts).
          # Sourced from the actual project graph so new modules participate automatically.
          ./gradlew clean :lib:publishAllLibModules -x test
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

      - name: Publish to Maven Central
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.JRELEASER_GITHUB_TOKEN }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          ./gradlew :lib:jreleaserFullRelease --stacktrace

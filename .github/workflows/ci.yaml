name: Build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "graalvm"
          java-version: "25"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Test with Gradle
        run: |
          ./gradlew clean
          ./gradlew spotlessApply
          ./gradlew build test --stacktrace --no-daemon --max-workers=2

      - name: Jacoco
        run: |
          ./gradlew :lib:kpipe-api:jacocoTestReport \
            :lib:kpipe-core:jacocoTestReport \
            :lib:kpipe-metrics:jacocoTestReport \
            :lib:kpipe-metrics-otel:jacocoTestReport \
            :lib:kpipe-format-avro:jacocoTestReport \
            :lib:kpipe-format-json:jacocoTestReport \
            :lib:kpipe-format-protobuf:jacocoTestReport \
            :lib:kpipe-consumer:jacocoTestReport \
            :lib:kpipe-producer:jacocoTestReport \
            :lib:kpipe-schema-registry-confluent:jacocoTestReport \
            :lib:kpipe-tracing-otel:jacocoTestReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: eschizoid/kpipe
          files: |
            ./lib/kpipe-api/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-core/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-metrics/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-metrics-otel/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-format-avro/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-format-json/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-format-protobuf/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-consumer/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-producer/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-schema-registry-confluent/build/reports/jacoco/test/jacocoTestReport.xml
            ./lib/kpipe-tracing-otel/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: eschizoid/kpipe
          files: |
            ./**/build/test-results/test/*.xml

services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    ports:
      - "9092:9092"
    environment:
      - CLUSTER_ID=kpipe-cluster
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: on-failure

  kafka-init:
    image: confluentinc/cp-kafka:8.2.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic json-topic
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic avro-topic
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic proto-topic
        echo 'Topics created successfully'
    restart: on-failure

  schema-registry:
    image: confluentinc/cp-schema-registry:8.2.0
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092
      - SCHEMA_REGISTRY_KAFKASTORE_TOPIC=_schemas
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  schema-init:
    image: alpine:3.22
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts/register-schema.sh:/scripts/register-schema.sh:ro
      - ./lib/src/test/resources/avro/customer.avsc:/schemas/customer.avsc:ro
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq
        sh /scripts/register-schema.sh /schemas/customer.avsc com.kpipe.customer http://schema-registry:8081
    restart: "no"

  kafka-consumer-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MESSAGE_FORMAT: ${MESSAGE_FORMAT:-avro}
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=kpipe-group
      - KAFKA_TOPIC=${MESSAGE_FORMAT:-avro}-topic
      - APP_NAME=kafka-consumer-app
    depends_on:
      schema-registry:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  kafka_data:

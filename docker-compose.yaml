services:
  kafka:
    image: soldevelo/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CLUSTER_ID=kpipe-cluster
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: on-failure

  kafka-init:
    image: soldevelo/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -ec
      - |
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic json-topic
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic avro-topic
        kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 --topic proto-topic
        echo 'Topics created successfully'
    restart: on-failure

  schema-registry:
    image: soldevelo/schema-registry:8.2.0
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      - SCHEMA_REGISTRY_ADVERTISED_HOSTNAME=schema-registry
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
      - SCHEMA_REGISTRY_KAFKA_BROKERS=PLAINTEXT://kafka:9092
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 8081 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  schema-init:
    image: alpine:3.22
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    volumes:
      - ./scripts/register-schema.sh:/scripts/register-schema.sh:ro
      - ./lib/kpipe-consumer/src/test/resources/avro/customer.avsc:/schemas/customer.avsc:ro
    command:
      - sh
      - -ec
      - |
        apk add --no-cache curl jq
        sh /scripts/register-schema.sh /schemas/customer.avsc com.kpipe.customer http://schema-registry:8081
    restart: "no"

  kafka-consumer-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MESSAGE_FORMAT: ${MESSAGE_FORMAT:-avro}
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=kpipe-group
      - KAFKA_TOPIC=${MESSAGE_FORMAT:-avro}-topic
      - APP_NAME=kafka-consumer-app
      - HEALTH_HTTP_PORT=8080
    depends_on:
      schema-registry:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  kafka_data:
